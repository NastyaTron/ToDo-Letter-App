<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDo Letter App</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <p>My Task Letters</p>
      <button type="submit">New Letter</button>
    </header>
    <div class="app">
      <aside class="sidebar">
        <ul>
          <li class="active" data-filter="all">📋 All</li>
          <li data-filter="active">⏳ Active</li>
          <li data-filter="completed">✅ Completed</li>
          <!-- <li>High priority</li>
          <li>Low priority</li> -->
        </ul>
      </aside>
      <div class="modal hidden">
        <div class="modal-content">
          <form>
            <button type="button" class="closeModal">✕</button>
            <input type="text" placeholder="Title" class="title" />
            <textarea placeholder="Description" class="description"></textarea>
            <button type="submit" class="addButton">Add</button>
          </form>
        </div>
      </div>
      <main class="content">
        <section id="All">
          <ul></ul>
        </section>
      </main>
    </div>
    <script type="module" src="./main.js"></script>
    <script type="module" src="./js/modal.js"></script>
    <script src="./js/filters.js"></script>
  </body>
</html>
